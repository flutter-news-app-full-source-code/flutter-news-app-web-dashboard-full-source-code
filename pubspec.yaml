name: verity_dashboard
description: "📊 The Verity Dashboard is a centralized Flutter Web command center for managing your entire news operation."
version: 1.14.0
publish_to: none
homepage: https://github.com/verity-hq/
repository: https://github.com/verity-hq/verity-dashboard
documentation: https://github.com/verity-hq/verity-dashboard/wiki
issue_tracker: https://github.com/verity-hq/verity-dashboard/issues
funding:
  - https://github.com/sponsors/flutter-news-app
topics:
  - flutter
  - flutter-full-app
  - flutter-news-app
  - flutter-news-app-dashboard
  - flutter-news-app-source-code

environment:
  sdk: ^3.9.0

dependencies:
  bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  collection: ^1.19.1
  core:
    git:
      url: https://github.com/verity-hq/core.git
      ref: 01ddd253e94303d86d9fbcc977acb2019f239fb4
  core_ui:
    git:
      url: https://github.com/verity-hq/core-ui.git
      ref: 051cdf79b85e3ffa124c90aa00cf873d722ae31c
  data_table_2: ^2.6.0
  dotted_border: ^3.1.0
  equatable: ^2.0.7
  file_picker: ^10.3.10
  fl_chart: ^1.0.0
  flex_color_scheme: ^8.3.0
  flutter:
    sdk: flutter
  flutter_adaptive_scaffold: ^0.3.3+1
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^16.0.0
  google_fonts: ^6.2.1
  http_parser: ^4.1.2
  intl: ^0.20.2
  logging: ^1.3.0
  pinput: ^6.0.0
  rxdart: ^0.28.0
  stream_transform: ^2.1.1
  timeago: ^3.7.1
  uuid: ^4.5.1

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mockingjay: ^2.1.0
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^9.0.0

flutter:
  uses-material-design: true
  generate: true
